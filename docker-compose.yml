services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    network_mode: host
    env_file:
      - .env
    environment:
      - DB_PATH=/data/phish_siem.db
    volumes:
      - sqlite_data:/data
    depends_on:
      - dashboard
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    network_mode: host
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DB_PATH=/data/phish_siem.db
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

volumes:
  sqlite_data:
